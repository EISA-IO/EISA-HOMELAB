name: eisa-homelab

services:
  #######################  CLOUDFLARED  #######################
  # Only runs if CLOUDFLARE_TUNNEL_TOKEN is set in .env.
  # In local-only mode the wizard sets the token to a no-op value and you
  # can remove this block, or just ignore the container's restart loop.
  cloudflared:
    image: cloudflare/cloudflared:2026.5.0
    container_name: cloudflared
    restart: always
    env_file: .env
    command: tunnel --no-autoupdate --protocol auto --retries 5 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - caddy
    profiles:
      - tunnel

  #######################  HEIMDALL  #######################
  heimdall:
    env_file: .env
    image: lscr.io/linuxserver/heimdall:2.7.6
    container_name: heimdall-media
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Riyadh}
    volumes:
      - ${PERSISTENT_STORAGE}/do-not-delete/heimdall/config:/config
    ports:
      - "8080:80"
    restart: always
    networks:
      - caddy

  ##########  CADDY  ##########
  caddy:
    image: caddy:2.11.3
    container_name: Caddy
    restart: always
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
    volumes:
      - ${PERSISTENT_STORAGE}/do-not-delete/caddy/Caddyfile:/etc/caddy/Caddyfile
      - ${PERSISTENT_STORAGE}/do-not-delete/caddy/site:/srv
      - ${PERSISTENT_STORAGE}/do-not-delete/caddy/caddy_data:/data
      - ${PERSISTENT_STORAGE}/do-not-delete/caddy/caddy_config:/config
    depends_on:
      authelia:
        condition: service_healthy
    environment:
      PUID: $PUID
      PGID: $PGID
    networks:
      - caddy

  ##########  AUTHELIA  ##########
  authelia:
    image: authelia/authelia:4.39.19
    container_name: Authelia
    volumes:
      - ${PERSISTENT_STORAGE}/do-not-delete/authelia:/config
      - ${PERSISTENT_STORAGE}/do-not-delete/authelia/assets:/assets
      - ${PERSISTENT_STORAGE}/do-not-delete/authelia/assets:/config/overrides
    ports:
      - "9091:9091"
    restart: always
    environment:
      PUID: $PUID
      PGID: $PGID
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9091/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caddy

  ##########  NAVIDROME — Stream Music  ##########
  navidrome:
    image: deluan/navidrome:0.60.3
    container_name: navidrome
    user: 1000:1000
    ports:
      - "4533:4533"
    restart: always
    environment:
      - TZ=${TZ:-Asia/Riyadh}
    volumes:
      - ${PERSISTENT_STORAGE}/navidrome:/data
      - ${MUSIC_PATH:-C:/MEDIA/Music}:/music:ro
    networks:
      - caddy
    profiles: [media, media-stream]

  ##########  JELLYFIN — Stream Movies & TV Shows  ##########
  jellyfin:
    env_file:
      - .env
    # Pinned to 10.10.7 because Jellyfin 10.11's StartupController.UpdateStartupUser
    # throws "Sequence contains no elements" — the wizard's API-driven admin-user
    # creation path was broken in 10.11 and the upstream issue (jellyfin#14576)
    # was closed as not-planned. 10.10.7 is the last release where Bootstrap-Jellyfin
    # (which lets Seerr's first-admin step run unattended) works reliably.
    image: jellyfin/jellyfin:10.10.7
    container_name: jellyfin
    ports:
      - 9014:8096
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Riyadh}
    volumes:
      - ${PERSISTENT_STORAGE}/jellyfin/library:/config
      - ${MOVIES_PATH:-C:/MEDIA/Movies}:/media/movies
      - ${TV_SHOWS_PATH:-C:/MEDIA/TV-Shows}:/media/tv
      - /tmp/jellyfin-transcode:/transcode
      - jellyfin_cache:/cache
    restart: always
    networks:
      - caddy
    profiles: [media, media-stream]

  ##########  FILE BROWSER  ##########
  filebrowser:
    env_file:
      - .env
    image: filebrowser/filebrowser:v2.63.3
    container_name: filebrowser
    volumes:
      # Claim /srv with a named volume so the filebrowser image's
      # VOLUME /srv directive doesn't auto-create an anonymous volume
      # on each container recreate. The sub-path bind mounts below
      # shadow it cleanly.
      - filebrowser_srv:/srv
      - ${MOVIES_PATH:-C:/MEDIA/Movies}:/srv/movies
      - ${TV_SHOWS_PATH:-C:/MEDIA/TV-Shows}:/srv/tv-shows
      - ${MUSIC_PATH:-C:/MEDIA/Music}:/srv/music
      - ${DOWNLOADS_PATH:-C:/MEDIA/Downloads}:/srv/downloads
      # /database and /config live in named docker volumes so we don't
      # rely on bind-mounted files existing on the host (which Docker
      # on Windows auto-creates as empty directories - that breaks the
      # sqlite db open with "is a directory").
      - filebrowser_database:/database
      - filebrowser_config:/config
      # settings.json is bind-mounted read-only on top of the /config volume
      # so users can edit filebrowser config from the host. The file is
      # tracked in git and always exists.
      - ${PERSISTENT_STORAGE}/do-not-delete/filebrowser/settings.json:/config/settings.json:ro
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - 8095:80
    restart: always
    networks:
      - caddy
    profiles: [media, productivity]

  #######################  OMNI-TOOLS  #######################
  omni-tools:
    image: iib0011/omni-tools:0.6.0
    container_name: omni-tools
    restart: unless-stopped
    ports:
      - "8890:80"
    networks:
      - caddy
    profiles: [media, productivity]

  # ========================
  # N8N (Workflow automation platform)
  # ========================
  n8n-postgres:
    image: postgres:16.14-alpine
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - ${PERSISTENT_STORAGE}/n8n/postgres_storage:/var/lib/postgresql/data
    networks:
      - caddy
    restart: always
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: [ai]

  n8n:
    image: n8nio/n8n:2.15.0
    env_file: .env
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_ENCRYPTION_KEY
      - N8N_USER_MANAGEMENT_JWT_SECRET
    container_name: n8n
    ports:
      - 5678:5678
    volumes:
      - ${PERSISTENT_STORAGE}/n8n/n8n_storage:/home/node/.n8n
      - ${PERSISTENT_STORAGE}/n8n/backup:/backup
      - ${PERSISTENT_STORAGE}/n8n/shared:/data/shared
    networks:
      - caddy
    restart: always
    depends_on:
      n8n-postgres:
        condition: service_healthy
    profiles: [ai]

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: qdrant
    ports:
      - 6333:6333
    volumes:
      - ${PERSISTENT_STORAGE}/n8n/qdrant_storage:/qdrant/storage
    networks:
      - caddy
    restart: always
    profiles: [ai]

  # ========================
  # OLLAMA (LLM BACKEND)
  # ========================
  ollama:
    env_file: .env
    image: ollama/ollama:0.23.2
    container_name: ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama:/root/.ollama
    ports:
      - 11434:11434
    tty: true
    restart: always
    networks:
      - caddy
    # GPU acceleration is opt-in via override files (chosen by setup.ps1):
    #   docker-compose.nvidia.yml  -> adds NVIDIA device reservation
    #   docker-compose.amd.yml     -> swaps to ollama:rocm + /dev/kfd, /dev/dri
    # With no override, this runs CPU-only (works everywhere, including
    # Apple Silicon, AMD without ROCm, plain Intel, etc.).
    profiles: [ai]

  # ========================
  # OPEN WEB UI (LLM FRONTEND)
  # ========================
  open-webui:
    env_file: .env
    image: ghcr.io/open-webui/open-webui:0.9.5
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - ${OPEN_WEBUI_PORT-9002}:8080
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      ENABLE_RAG_WEB_SEARCH: "True"
      RAG_WEB_SEARCH_ENGINE: searxng
      RAG_WEB_SEARCH_RESULT_COUNT: 3
      RAG_WEB_SEARCH_CONCURRENT_REQUESTS: 10
      SEARXNG_QUERY_URL: http://searxng:8080/search?q=<query>
    restart: always
    networks:
      - caddy
    profiles: [ai]

  # ========================
  # HERMES AGENT — NousResearch's self-improving agent gateway.
  # Exclusively wired to the in-stack ollama. config.yaml is rendered
  # by setup.ps1 and bind-mounted on top of the data volume so it
  # survives container recreate without touching state. No OpenRouter,
  # no Anthropic, no cloud — all 5 LLM roles (main + 4 auxiliaries)
  # call http://ollama:11434/v1.
  #
  # Image pinned per upstream Docker Hub: nousresearch/hermes-agent
  # CI builds rolling sha-<full-sha> + v<date> tags. v2026.5.7 is the
  # latest released image as of 2026-05.
  # ========================
  hermes-agent:
    image: nousresearch/hermes-agent:v2026.5.7
    container_name: hermes-agent
    env_file: .env
    environment:
      # Gateway HTTP API. Must be on a non-loopback host so the
      # workspace container can reach it across the caddy network;
      # docs/AGENT-PAIRING.md notes the gateway refuses to start on
      # a non-loopback host without API_SERVER_KEY.
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${HERMES_API_KEY}
      - API_SERVER_CORS_ORIGINS=*
      # Dashboard (sessions / conductor missions UI). The workspace
      # talks to BOTH ports.
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      # Local Ollama models can take many seconds to first-token;
      # the upstream Ollama-setup doc recommends bumping the timeout.
      - HERMES_API_TIMEOUT=1800
      - HERMES_UID=1000
      - HERMES_GID=1000
    volumes:
      - hermes_data:/opt/data
      # config.yaml is auto-rendered by setup.ps1 (Configure-HermesAgent)
      # and locks every LLM role to the in-stack ollama. ro mount so
      # the agent can't write through it.
      - ${PERSISTENT_STORAGE}/do-not-delete/hermes-agent/config.yaml:/opt/data/config.yaml:ro
    ports:
      - "8642:8642"
      - "9119:9119"
    depends_on:
      - ollama
    # Lenient healthcheck: succeeds as soon as the gateway is listening
    # on 8642, regardless of what /health returns. Without -f, curl
    # exits 0 for any HTTP response (including 404 / 503), only failing
    # on connection refused / DNS / timeout. Exact /health semantics
    # aren't stable across versions and may return 503 until Ollama
    # answers the first request, which we don't want to gate on.
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null --connect-timeout 3 http://localhost:8642/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      - caddy
    profiles: [ai]

  # ========================
  # HERMES WORKSPACE — web UI for chatting with hermes-agent, managing
  # memory + swarms. Pure Node.js, env-var-driven (no config file).
  # Pairs with hermes-agent over two HTTP URLs sharing one bearer
  # token (API_SERVER_KEY == HERMES_API_TOKEN).
  # ========================
  hermes-workspace:
    image: ghcr.io/outsourc-e/hermes-workspace:v2.1.3
    container_name: hermes-workspace
    environment:
      - HERMES_API_URL=http://hermes-agent:8642
      - HERMES_API_TOKEN=${HERMES_API_KEY}
      - HERMES_DASHBOARD_URL=http://hermes-agent:9119
      # Plain-HTTP LAN access — Secure-only cookies silently break
      # login over http://. Caddy fronts everything with https in
      # tunnel mode, so cookie security is delegated upstream there.
      - COOKIE_SECURE=0
      # The workspace refuses to bind off-loopback without either
      # HERMES_PASSWORD or this flag. We choose the flag because
      # Authelia + Caddy already gate it in tunnel mode and on LAN
      # the trust boundary is the LAN itself.
      - HERMES_ALLOW_INSECURE_REMOTE=1
    volumes:
      # Workspace persists encrypted session tokens at
      # /home/workspace/.hermes/workspace-sessions.json. Upstream
      # compose pattern shares the agent's data volume; we mirror
      # that here so the workspace can also read agent-side state
      # (model list, etc.).
      - hermes_data:/home/workspace/.hermes
    ports:
      - "3030:3000"
    # service_started, not service_healthy: the workspace has its own
    # retry loop against the agent (HERMES_API_URL polled until 200), so
    # blocking compose up on the agent's healthcheck just risks cascade
    # failure if the agent takes longer than expected to bind. Workspace
    # shows a brief "connecting" state until the agent answers — fine UX,
    # zero failure mode.
    depends_on:
      - hermes-agent
    restart: always
    networks:
      - caddy
    profiles: [ai]

  #######################  SEARXNG  #######################
  searxng:
    env_file: .env
    container_name: searxng
    image: docker.io/searxng/searxng:2026.5.15-afafca93f
    restart: always
    ports:
      - "8031:8080"
    volumes:
      - ${PERSISTENT_STORAGE}/do-not-delete/searxng:/etc/searxng
      - searxng_cache:/var/cache/searxng
    networks:
      - caddy
    profiles: [ai]

  # ========================
  # LOCAL DEEP RESEARCH — AI research assistant
  # ========================
  local-deep-research:
    image: localdeepresearch/local-deep-research:1.6.10
    container_name: local-deep-research
    restart: unless-stopped
    ports:
      # Host 5005 -> container 5000. Default was 5000:5000 but macOS's
      # AirPlay Receiver service (System Settings -> General -> AirDrop &
      # Handoff) listens on 5000 on Monterey+, causing a port-bind clash.
      # Other containers still talk to this service over the docker network
      # at local-deep-research:5000, so only the host-facing URL changes
      # (now http://localhost:5005).
      - "5005:5000"
    environment:
      - LDR_WEB_HOST=0.0.0.0
      - LDR_WEB_PORT=5000
      - LDR_DATA_DIR=/data
      - LDR_LLM_OLLAMA_URL=http://ollama:11434
      - LDR_SEARCH_ENGINE_WEB_SEARXNG_DEFAULT_PARAMS_INSTANCE_URL=http://searxng:8080
    volumes:
      - ldr_data:/data
      - ldr_scripts:/scripts
      # Claim /app/.config/local_deep_research so the image's VOLUME
      # directive there doesn't auto-create an anonymous volume.
      - ldr_config:/app/.config/local_deep_research
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    depends_on:
      - ollama
      - searxng
    networks:
      - caddy
    profiles: [ai]

  # ========================
  # VANE — privacy-focused AI answering engine
  # ========================
  vane:
    image: itzcrazykns1337/vane:slim-v1.12.2
    container_name: vane
    environment:
      SEARXNG_API_URL: http://searxng:8080
    ports:
      - "3000:3000"
    volumes:
      - vane_data:/home/vane/data
    depends_on:
      - searxng
      - ollama
    restart: always
    networks:
      - caddy
    profiles: [ai]

  ##########  PORTAINER  ##########
  portainer:
    image: portainer/portainer-ce:2.41.1
    container_name: Portainer
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${PERSISTENT_STORAGE}/portainer:/data
    ports:
      - "9000:9000"
    environment:
      PUID: $PUID
      PGID: $PGID
    networks:
      - caddy

  # ========================
  # TOR BROWSER (in-browser anonymous browsing)
  # User: kasm_user (fixed by upstream image) / Password: TOR_VNC_PW from .env
  # Auto-login URL (skips the login form entirely):
  #   https://localhost:6901/?username=kasm_user&password=${TOR_VNC_PW}&autoconnect=true&resize=remote
  # In tunnel mode Caddy rewrites bare / -> the auto-login URL automatically,
  # so https://tor.${DOMAIN}/ logs you straight into the desktop.
  # ========================
  tor-browser:
    env_file: .env
    image: kasmweb/tor-browser:1.17.0
    container_name: tor-browser
    shm_size: 512m
    ports:
      - "6901:6901"
    environment:
      - VNC_PW=${TOR_VNC_PW}
    volumes:
      - ${DOWNLOADS_PATH:-C:/MEDIA/Downloads}:/home/kasm-user/Downloads
    networks:
      - caddy
    restart: always
    profiles: [media, productivity]

  # ========================
  # IMMICH (self-hosted photo + video library, like Google Photos)
  # 4-container sub-stack: server (web/API), machine-learning (face/object
  # recognition), redis (cache), postgres (DB with pgvecto-rs).
  # Web UI: http://localhost:2283
  # Hardware acceleration (transcoding + ML inference) layers on via the
  # docker-compose.nvidia.yml / docker-compose.amd.yml overrides selected
  # automatically by setup.ps1 based on detected GPU.
  # ========================
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-v2.7.5}
    container_name: immich-server
    env_file: .env
    environment:
      - DB_HOSTNAME=immich-postgres
      - REDIS_HOSTNAME=immich-redis
      # Telemetry is OPT-IN in Immich (default off when IMMICH_TELEMETRY_INCLUDE
      # is unset). Don't set it here, and don't set it in .env — leaving it
      # unset gives the most private default. Valid values, for reference,
      # are comma-separated subsets of: host, api, microservices, jobs, io, repo.
    volumes:
      - ${PHOTOS_PATH:-C:/MEDIA/Photos}:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "2283:2283"
    depends_on:
      immich-redis:
        condition: service_healthy
      immich-postgres:
        condition: service_healthy
    restart: always
    networks:
      - caddy
    profiles: [media, media-stream]

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v2.7.5}
    container_name: immich-machine-learning
    env_file: .env
    volumes:
      - immich_model_cache:/cache
    restart: always
    networks:
      - caddy
    profiles: [media, media-stream]

  immich-redis:
    image: docker.io/valkey/valkey:9.0.4
    container_name: immich-redis
    # Valkey/redis writes RDB snapshots to /data. Without a volume that
    # path lives in the container's writable layer — every recreate
    # wipes the cache. Named volume keeps it persistent across restarts.
    volumes:
      - immich_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - caddy
    profiles: [media, media-stream]

  immich-postgres:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-postgres
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ${PERSISTENT_STORAGE}/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE_NAME} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      - caddy
    profiles: [media, media-stream]

  # ========================
  # REQUEST + DOWNLOAD STACK ("*arr") - Seerr asks, *arr resolves.
  #
  # Flow: user requests a movie/show in Seerr -> Seerr posts the request
  # to Sonarr (TV) or Radarr (movies) -> *arr searches Prowlarr's indexers
  # for a 1080p release -> hands the magnet/torrent to qBittorrent ->
  # qBittorrent downloads to DOWNLOADS_PATH -> *arr imports the finished
  # file into TV_SHOWS_PATH / MOVIES_PATH -> Jellyfin picks it up.
  #
  # All five services use linuxserver.io images (well-maintained, common
  # PUID/PGID + TZ env vars). Pre-seeded config files written by setup.ps1
  # before first boot give each app a known API key so the configurator
  # can wire them together without prompts.
  # ========================

  # qBittorrent - the actual torrent client. WEBUI_PORT stays 8080 inside
  # the container; published as 9081 on the host to avoid colliding with
  # Heimdall (8080). Default login is admin/adminadmin via pre-seeded
  # qBittorrent.conf; subnet whitelist lets containers on the caddy
  # network and 127.0.0.1 bypass auth entirely so the API configurator
  # doesn't need creds.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.2.0
    container_name: qbittorrent
    env_file: .env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Riyadh}
      # qBittorrent v5 hard-rejects requests whose Host-header port doesn't
      # match the listening port (no longer overridable via HostHeaderValidation).
      # Listen + publish on the SAME port so qb.localhost / localhost:9081 /
      # qbittorrent:9081 all carry a matching Host header.
      - WEBUI_PORT=9081
    volumes:
      - ${PERSISTENT_STORAGE}/do-not-delete/qbittorrent:/config
      - ${DOWNLOADS_PATH:-C:/MEDIA/Downloads}:/downloads
    ports:
      - 9081:9081
      # BitTorrent listen port (TCP+UDP) - opening these on your router
      # gives better swarm connectivity but is optional.
      - 6881:6881
      - 6881:6881/udp
    restart: always
    networks:
      - caddy
    profiles: [media, media-request]

  # Prowlarr - central indexer manager. Adds an indexer ONCE here, syncs
  # it to Sonarr + Radarr automatically. Pre-seeded with public/no-signup
  # indexers (1337x, YTS, EZTV, TheRARBG, ThePirateBay) by the wizard.
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.5
    container_name: prowlarr
    env_file: .env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Riyadh}
    volumes:
      - ${PERSISTENT_STORAGE}/do-not-delete/prowlarr:/config
    ports:
      - 9696:9696
    restart: always
    networks:
      - caddy
    profiles: [media, media-request]

  # Sonarr - TV show automation. Watches Prowlarr indexers for releases
  # matching its monitored shows, hands magnet links to qBittorrent,
  # imports finished episodes into TV_SHOWS_PATH at 1080p.
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17
    container_name: sonarr
    env_file: .env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Riyadh}
    volumes:
      - ${PERSISTENT_STORAGE}/do-not-delete/sonarr:/config
      - ${TV_SHOWS_PATH:-C:/MEDIA/TV-Shows}:/tv
      - ${DOWNLOADS_PATH:-C:/MEDIA/Downloads}:/downloads
    ports:
      - 8989:8989
    restart: always
    depends_on:
      - qbittorrent
      - prowlarr
    networks:
      - caddy
    profiles: [media, media-request]

  # Radarr - movie automation. Same role as Sonarr but for films.
  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1
    container_name: radarr
    env_file: .env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Riyadh}
    volumes:
      - ${PERSISTENT_STORAGE}/do-not-delete/radarr:/config
      - ${MOVIES_PATH:-C:/MEDIA/Movies}:/movies
      - ${DOWNLOADS_PATH:-C:/MEDIA/Downloads}:/downloads
    ports:
      - 7878:7878
    restart: always
    depends_on:
      - qbittorrent
      - prowlarr
    networks:
      - caddy
    profiles: [media, media-request]

  # Seerr - the user-facing request UI. Talks to Jellyfin (already in
  # the stack) for library state, Sonarr + Radarr for new requests.
  # settings.json is pre-written so Seerr's first-run wizard is skipped.
  seerr:
    # Seerr only publishes `develop`/`sha-*` tags (no semver) on Docker Hub.
    # Pin to the SHA that corresponds to the last QA'd build.
    image: seerr/seerr:sha-92c486d
    container_name: seerr
    env_file: .env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-Asia/Riyadh}
      - LOG_LEVEL=info
    volumes:
      - ${PERSISTENT_STORAGE}/do-not-delete/seerr:/app/config
    ports:
      - 5055:5055
    restart: always
    depends_on:
      - sonarr
      - radarr
    networks:
      - caddy
    profiles: [media, media-request]

volumes:
  ollama:
  open-webui:
  jellyfin_cache:
  filebrowser_database:
  filebrowser_config:
  filebrowser_srv:
  searxng_cache:
  ldr_data:
  ldr_scripts:
  ldr_config:
  immich_model_cache:
  immich_redis_data:
  vane_data:
  hermes_data:

networks:
  caddy:
    driver: bridge
    name: caddy

# =============================================================================
# Compose override - NATIVE Ollama on macOS (Apple Silicon, Metal-accelerated)
#
# Applied automatically by setup.ps1 when the wizard's GPU detection picks
# 'native' (or when state.gpuMode == 'native').
#
# Why: Docker Desktop on macOS runs containers inside a Linux VM that can't
# reach Apple's Metal GPU. Even on the highest-end Apple Silicon chips the
# in-container Ollama is CPU-only. Installing Ollama natively on the Mac
# (Homebrew, DMG, whatever) lets it use Metal directly - orders of magnitude
# faster for LLM inference.
#
# Requirements on the host:
#   - macOS with Apple Silicon (M1/M2/M3/M4 family)
#   - `brew install ollama && brew services start ollama`
#     (or download ollama.app from https://ollama.com and run it)
#   - Confirm with: curl http://localhost:11434/api/tags
#
# What this override does:
#   - `!override`s ollama's `profiles` list, moving it out of `ai` and into
#     `native-disabled` (a profile we never activate). With `--profile ai`
#     still in effect for the rest of the AI stack, ollama is the only
#     service excluded.
#   - `!override`s open-webui/local-deep-research/vane/hermes-agent
#     `depends_on` so the missing ollama doesn't block them from starting.
#   - Repoints those four at http://host.docker.internal:11434 — Docker
#     Desktop on Mac maps that hostname to the host loopback automatically,
#     so they reach the Mac-native Ollama serving on port 11434 via Metal.
#   - hermes-dashboard and hermes-workspace only depend on hermes-agent,
#     not ollama directly, so they need no override here.
#
# Note: Immich's machine-learning service still runs CPU-only on Mac (no
# Metal-enabled image upstream). Jellyfin transcoding is also CPU-only.
# Both are still fast on modern Apple Silicon CPUs; just not GPU-accelerated.
# =============================================================================
services:
  # Take the ollama service out of the active 'ai' profile entirely.
  ollama:
    profiles: !override
      - native-disabled

  open-webui:
    depends_on: !override []
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      ENABLE_RAG_WEB_SEARCH: "True"
      RAG_WEB_SEARCH_ENGINE: searxng
      RAG_WEB_SEARCH_RESULT_COUNT: 3
      RAG_WEB_SEARCH_CONCURRENT_REQUESTS: 10
      SEARXNG_QUERY_URL: http://searxng:8080/search?q=<query>

  local-deep-research:
    depends_on: !override
      - searxng
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LDR_WEB_HOST=0.0.0.0
      - LDR_WEB_PORT=5000
      - LDR_DATA_DIR=/data
      - LDR_LLM_OLLAMA_URL=http://host.docker.internal:11434
      - LDR_SEARCH_ENGINE_WEB_SEARXNG_DEFAULT_PARAMS_INSTANCE_URL=http://searxng:8080

  vane:
    depends_on: !override
      - searxng
    extra_hosts:
      - "host.docker.internal:host-gateway"

  hermes-agent:
    depends_on: !override []
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_HOST: 'http://host.docker.internal:11434'
      OLLAMA_BASE_URL: 'http://host.docker.internal:11434'
      OPENAI_API_BASE: 'http://host.docker.internal:11434/v1'
      OPENAI_BASE_URL: 'http://host.docker.internal:11434/v1'
